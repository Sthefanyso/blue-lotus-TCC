<main class="main">
    <div class="column-image">
        <div class="image">
            <img src="/assets/recover-password/forgot-password-amico.svg" alt="">
        </div>
        <div class="return">
            <button  class="btn-return" (click)="voltar()"><img src="/assets/recover-password/return-button.svg"alt=""></button>
        </div>
    </div>
    <div class="box-model">
        <img class="wave-background" src="assets/login/right-wave.png" alt="">
        <h2>
            Redefinir a senha
        </h2>
        <p class="text">
            Informe o e-mail cadastrado para enviarmos um link para recuperação da sua senha
        </p>
        <div class="text-field">
            <p>Email<br><input type="email" name="email" id="" required></p>
        </div>
        <button class="btn-green">
            Enviar
        </button>
        <div class="back">
         <a (click)="voltar()">Voltar para o login</a>
        </div>
    </div>
    <app-modal [title]="'Título do Modal'" [message]="'Mensagem do Modal'"></app-modal>
</main>
