<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 350px;
            height: 500px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            text-align: center;
            font-size: 20px;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            width: fit-content;
            max-width: 80%;
        }

        .user-message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
        }

        .bot-message {
            background-color: #f1f1f1;
            align-self: flex-start;
        }

        .chat-footer {
            padding: 10px;
            display: flex;
            border-top: 1px solid #ccc;
        }

        .chat-footer input[type="text"] {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .chat-footer button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
        }

        .chat-footer button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            Chatbot
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message bot-message">
                Olá! Como posso ajudar você hoje?
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" id="user-input" placeholder="Digite sua mensagem...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const rasaEndpoint = "http://localhost:5005/webhooks/rest/webhook"; // URL do Rasa

        // Função para enviar mensagem do usuário
        function sendMessage() {
            const userInput = document.getElementById("user-input").value;
            if (userInput.trim() === "") return;

            // Adiciona a mensagem do usuário na tela
            addMessageToChat(userInput, 'user-message');
            
            // Envia a mensagem para o Rasa
            fetch(rasaEndpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    sender: "user",  // Pode ser um ID único do usuário
                    message: userInput
                })
            })
            .then(response => response.json())
            .then(data => {
                // Processa a resposta do Rasa
                if (data.length > 0) {
                    data.forEach(response => {
                        addMessageToChat(response.text, 'bot-message');
                    });
                }
            })
            .catch(error => {
                console.error("Erro:", error);
                addMessageToChat("Ocorreu um erro ao se comunicar com o servidor.", 'bot-message');
            });

            // Limpa o campo de input
            document.getElementById("user-input").value = "";
        }

        // Função para adicionar mensagens ao chat
        function addMessageToChat(message, messageClass) {
            const chatBody = document.getElementById("chat-body");
            const messageElement = document.createElement("div");
            messageElement.classList.add("message", messageClass);
            messageElement.textContent = message;
            chatBody.appendChild(messageElement);
            chatBody.scrollTop = chatBody.scrollHeight; // Rola o chat para a última mensagem
        }
    </script>

</body>
</html>
